server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Canonicalize path without trailing slash.
    location = /loom {
        return 301 /loom/;
    }

    # Proxy API requests for subpath deployment.
    location /loom/api {
        rewrite ^/loom(/api/.*)$ $1 break;
        proxy_pass http://backend:5003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Serve the SPA under /loom/ while files stay in /usr/share/nginx/html.
    location /loom/ {
        rewrite ^/loom/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    # Keep root /api support for local/direct access.
    location /api {
        proxy_pass http://backend:5003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Optional root access fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
