services:
  backend:
    build:
      context: ./Backend
    command: gunicorn --bind 0.0.0.0:5003 --workers 1 --threads 4 --timeout 600 server:app
    ports:
      - "127.0.0.1:5003:5003"
    volumes:
      - ./Example_Data:/app/Example_Data
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
    ports:
      - "127.0.0.1:9696:80"
    depends_on:
      - backend
    restart: unless-stopped
